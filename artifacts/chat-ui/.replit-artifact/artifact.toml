kind = "web"
previewPath = "/"
title = "Radhika Khattar AI Persona"
version = "1.0.0"
id = "artifacts/chat-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24918

[services.development]
run = "pnpm --filter @workspace/chat-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat-ui", "run", "build" ]
publicDir = "artifacts/chat-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24918"
BASE_PATH = "/"
